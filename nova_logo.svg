<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Transparent background -->
  <defs>
    <radialGradient id="supernova" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="30%" style="stop-color:#ffff00;stop-opacity:0.9" />
      <stop offset="60%" style="stop-color:#ffa500;stop-opacity:0.7" />
      <stop offset="100%" style="stop-color:#ff4500;stop-opacity:0" />
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Outer explosion rays -->
  <g filter="url(#glow)">
    <line x1="256" y1="256" x2="256" y2="50" stroke="url(#supernova)" stroke-width="6" />
    <line x1="256" y1="256" x2="400" y2="100" stroke="url(#supernova)" stroke-width="5" />
    <line x1="256" y1="256" x2="462" y2="256" stroke="url(#supernova)" stroke-width="6" />
    <line x1="256" y1="256" x2="400" y2="412" stroke="url(#supernova)" stroke-width="5" />
    <line x1="256" y1="256" x2="256" y2="462" stroke="url(#supernova)" stroke-width="6" />
    <line x1="256" y1="256" x2="112" y2="412" stroke="url(#supernova)" stroke-width="5" />
    <line x1="256" y1="256" x2="50" y2="256" stroke="url(#supernova)" stroke-width="6" />
    <line x1="256" y1="256" x2="112" y2="100" stroke="url(#supernova)" stroke-width="5" />
  </g>
  
  <!-- Core star -->
  <circle cx="256" cy="256" r="60" fill="url(#supernova)" filter="url(#glow)" />
  <circle cx="256" cy="256" r="40" fill="#ffffff" />
  
  <!-- Text "NOVA" -->
  <text x="256" y="400" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#ffffff" text-anchor="middle">NOVA</text>
</svg>