name: Release Nova Language

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build and Release
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "gradle"

      - name: Grant Execute Permission for Gradlew
        run: git update-index --chmod=+x gradlew
        shell: bash

      - name: Build Distribution
        run: ./gradlew installDist

      - name: Create ZIP Package
        run: |
          Compress-Archive -Path build/install/nova/* -DestinationPath release/nova-${{ github.ref_name }}-windows.zip
        shell: pwsh

      - name: Create MSI Installer
        run: |
          jpackage --input build/install/nova/lib `
                   --main-jar nova-0.5.7.jar `
                   --main-class com.luminar.nova.Main `
                   --type msi `
                   --name Nova `
                   --app-version 0.5.7 `
                   --vendor "Luminar" `
                   --description "The Nova Programming Language" `
                   --license-file LICENSE.txt `
                   --win-dir-chooser `
                   --win-menu `
                   --win-shortcut `
                   --dest release
        shell: pwsh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release/*.zip
            release/*.msi
          body: |
            ## ✦ Nova Language ${{ github.ref_name }}

            Pembaruan terbaru untuk bahasa pemrograman Nova!

            ### Fitur Utama:
            - **Async/Await**: Dukungan pemrograman asinkron.
            - **Ternary Operator**: Ekspresi kondisional singkat `? :`.
            - **MSI Installer**: Instalasi mudah dengan antarmuka grafis (GUI).

            ### Cara Instalasi:
            1. Unduh file `.msi` untuk Windows.
            2. Jalankan dan ikuti petunjuk di layar (Accept License, Pilih Folder).
            3. Buka terminal baru dan ketik `nova version`.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
